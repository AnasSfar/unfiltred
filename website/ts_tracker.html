<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taylor Swift · Spotify Charts Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:       #1db954;
      --green-dark:  #15883e;
      --bg:          #eef2f4;
      --surface:     #ffffff;
      --surface2:    #f7f9fa;
      --text:        #101828;
      --text2:       #344054;
      --muted:       #667085;
      --border:      rgba(16,24,40,.08);
      --up:          #067647;
      --dn:          #b42318;
      --gold:        #92400e;
      --gold-bg:     #fef3c7;
      --gold-bdr:    #fcd34d;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow-xs:   0 1px 2px rgba(0,0,0,.06);
      --shadow-sm:   0 2px 8px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:   0 8px 28px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAV ─── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px) saturate(140%);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; align-items: center;
      height: 54px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none; margin-right: auto;
    }
    .nav-brand svg { color: var(--green); flex-shrink: 0; }
    .nav-title {
      font-size: 13.5px; font-weight: 700; color: var(--text); letter-spacing: -.2px;
    }
    .nav-title span { color: var(--muted); font-weight: 400; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 6px 13px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: background .14s, color .14s;
    }
    .nav-link:hover  { background: var(--surface2); color: var(--text); }
    .nav-link.active { background: var(--text); color: #fff; }

    /* ─── PAGE ─── */
    #app {
      max-width: 920px; margin: 0 auto;
      padding: 28px 16px 72px;
    }

    /* ─── CHART CARD ─── */
    .chart-card { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md); }

    .chart-hdr {
      padding: 26px 22px;
      background:
        radial-gradient(circle at 75% 55%, rgba(29,185,84,.17) 0%, transparent 45%),
        radial-gradient(circle at 18% 30%, rgba(100,60,220,.10) 0%, transparent 42%),
        linear-gradient(135deg, #0d1a12 0%, #131e15 55%, #0e1c24 100%);
      display: flex; align-items: center; gap: 16px;
    }
    .chart-hdr-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .chart-hdr-sub   { font-size: 12.5px; color: rgba(255,255,255,.62); margin-top: 4px; }

    .col-heads {
      display: grid;
      grid-template-columns: 52px 56px 1fr 108px 68px 68px 58px 58px 58px;
      column-gap: 6px; padding: 7px 14px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .col-heads span {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      display: flex; align-items: center;
    }
    .col-heads .r { justify-content: flex-end; }

    .song-row {
      display: grid;
      grid-template-columns: 52px 56px 1fr 108px 68px 68px 58px 58px 58px;
      column-gap: 6px; align-items: center;
      padding: 9px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit; cursor: pointer;
      transition: background .1s;
    }
    .song-row:last-of-type { border-bottom: none; }
    .song-row:hover { background: rgba(29,185,84,.04); }
    .song-row.odd   { background: var(--surface2); }
    .song-row.odd:hover { background: rgba(29,185,84,.06); }
    .song-row.gold  {
      background: linear-gradient(90deg, #fff8d0 0%, #fffbee 35%, var(--surface) 100%);
      border-left: 3px solid #e8b91a;
    }
    .song-row.gold:hover { background: linear-gradient(90deg, #fff2a8 0%, #fff8d8 35%, rgba(29,185,84,.04) 100%); }

    .col-pos {
      font-size: 16px; font-weight: 900; color: var(--text);
      letter-spacing: -.05em; text-align: center;
    }
    .col-chg {
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .chg-up  { color: var(--up); }
    .chg-dn  { color: var(--dn); }
    .chg-eq  { color: var(--muted); }
    .chg-new { color: #0369a1; font-size: 9px; font-weight: 800; letter-spacing: .04em; }
    .chg-re  { color: #7c3aed; font-size: 9px; font-weight: 800; letter-spacing: .04em; }

    .col-track { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .track-art    {
      width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
      object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,.13);
    }
    .track-art-ph {
      width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
      background: linear-gradient(135deg, #d8e2ea, #c2cdd7);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: var(--muted);
    }
    .track-name   { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .col-num { font-size: 12px; font-weight: 500; color: var(--text2); display: flex; align-items: center; justify-content: flex-end; }
    .col-num.up { color: var(--up); font-weight: 600; }
    .col-num.dn { color: var(--dn); font-weight: 600; }

    .peak-pill {
      font-size: 10.5px; font-weight: 800; color: var(--gold);
      background: var(--gold-bg); border: 1px solid var(--gold-bdr);
      border-radius: 5px; padding: 2px 6px;
    }
    .peak-pill.p1 { color: #78350f; background: #fef08a; border-color: #eab308; }

    /* OUT */
    .out-sep {
      padding: 7px 14px;
      background: rgba(180,35,24,.05);
      border-top: 2px solid rgba(180,35,24,.2);
      border-bottom: 1px solid rgba(180,35,24,.1);
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--dn);
    }
    .out-row {
      display: grid; grid-template-columns: 52px 56px 1fr;
      column-gap: 6px; align-items: center;
      padding: 9px 14px;
      background: rgba(249,247,247,.9);
      border-bottom: 1px solid var(--border); opacity: .76;
    }
    .out-badge {
      font-size: 9.5px; font-weight: 800; color: #fff;
      background: var(--dn); border-radius: 4px;
      padding: 2px 6px; width: fit-content; margin: auto;
    }

    /* FOOTER */
    .chart-ftr {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 16px;
      background: var(--surface2); border-top: 1px solid var(--border);
    }
    .chart-ftr-handle { font-size: 11px; font-weight: 700; color: var(--green); }
    .chart-ftr-meta   { font-size: 11px; font-weight: 500; color: var(--muted); }

    /* ─── HISTORY BAR ─── */
    .history-bar {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px 22px; margin-bottom: 22px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
    }
    .hbar-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: 8px;
    }
    .date-row { display: flex; align-items: center; gap: 10px; }
    .date-input {
      padding: 7px 13px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px;
      font-family: 'Inter', sans-serif; font-weight: 500;
      color: var(--text); background: var(--surface);
      outline: none; cursor: pointer; transition: border-color .14s;
    }
    .date-input:focus { border-color: var(--green); }
    .nav-btn {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--surface);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text2); transition: background .12s, border-color .12s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--text2); }
    .nav-btn:disabled { opacity: .32; cursor: not-allowed; }
    .hbar-meta { margin-left: auto; font-size: 12px; color: var(--muted); text-align: right; }

    /* ─── SONG PAGE ─── */
    .breadcrumb {
      display: flex; align-items: center; gap: 7px;
      font-size: 12.5px; color: var(--muted); margin-bottom: 18px;
    }
    .breadcrumb a { color: var(--green); text-decoration: none; font-weight: 500; }
    .breadcrumb a:hover { text-decoration: underline; }

    .song-hdr {
      background: var(--surface); border-radius: var(--radius);
      padding: 24px 26px; margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 22px;
    }
    .song-art     { width: 92px; height: 92px; border-radius: 10px; object-fit: cover; flex-shrink: 0; box-shadow: 0 8px 24px rgba(0,0,0,.18); }
    .song-art-ph  { width: 92px; height: 92px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg, #d8e2ea, #c2cdd7); display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .song-name    { font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
    .song-artist  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .song-sub     { font-size: 12.5px; color: var(--green); font-weight: 600; margin-top: 8px; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card  { background: var(--surface); border-radius: var(--radius); padding: 18px 14px; text-align: center; box-shadow: var(--shadow-xs); }
    .stat-val   { font-size: 26px; font-weight: 900; letter-spacing: -.05em; color: var(--text); }
    .stat-val.gold  { color: var(--gold); }
    .stat-val.green { color: var(--green-dark); }
    .stat-lbl   { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 5px; }

    .section-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }

    .tier-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 20px; }
    .tier-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 6px; text-align: center; box-shadow: var(--shadow-xs); }
    .tier-lbl  { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 5px; }
    .tier-val  { font-size: 19px; font-weight: 800; color: var(--muted); }
    .tier-val.has { color: var(--green-dark); }

    .chart-box       { background: var(--surface); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow-xs); }
    .chart-box-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .chart-box-title small { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 6px; }
    .chart-wrap { height: 210px; position: relative; }

    .hist-table { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-xs); overflow: hidden; margin-bottom: 14px; }
    .hist-head  {
      display: grid; grid-template-columns: 110px 58px 108px 80px 80px 68px;
      gap: 6px; padding: 7px 16px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .hist-head span { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: flex; align-items: center; }
    .hist-head .r { justify-content: flex-end; }
    .hist-row {
      display: grid; grid-template-columns: 110px 58px 108px 80px 80px 68px;
      gap: 6px; padding: 8px 16px;
      border-bottom: 1px solid var(--border); font-size: 12px; align-items: center;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-row.hl { background: rgba(29,185,84,.05); font-weight: 600; }
    .hist-row .r { text-align: right; justify-content: flex-end; display: flex; }
    .hist-more { padding: 10px 16px; font-size: 11px; color: var(--muted); text-align: center; background: var(--surface2); }

    /* ─── LOADING / EMPTY ─── */
    .loading { display: flex; align-items: center; justify-content: center; height: 180px; color: var(--muted); font-size: 13px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; line-height: 1.7; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 680px) {
      .col-heads, .song-row {
        grid-template-columns: 44px 46px 1fr 88px 56px;
      }
      .col-heads span:nth-child(n+6),
      .song-row > *:nth-child(n+6) { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .tier-grid  { grid-template-columns: repeat(4, 1fr); }
      .hist-head, .hist-row { grid-template-columns: 96px 48px 96px 64px; }
      .hist-head span:nth-child(n+5),
      .hist-row > *:nth-child(n+5) { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#global/chart">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    <div class="nav-title">Taylor Swift <span>· Spotify Charts</span></div>

  <div class="nav-links">
    <a class="nav-link" href="../index.html" title="Home">🏠</a>

    <span style="width:1px;background:var(--border);margin:0 4px;align-self:stretch;display:inline-block"></span>
    <a class="nav-link" id="nl-chart">Today</a>
    <a class="nav-link" id="nl-history">History</a>
  </div>
</nav>

<div id="app">
  <div class="loading"><div class="spinner"></div> Loading data…</div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const REGIONS = {
  global: {
    histUrl: () => '../collectors/spotify/charts/global/ts_history.json',
    dayUrl:  d  => { const [y,m]=d.split('-'); return `../collectors/spotify/charts/global/${y}/${m}/${d}/ts_chart_${d}.json`; },
    title:      'Global Spotify',
    coversUrl:  '../spotify-charts/track_covers.json',
  },
  fr: {
    histUrl: () => '../collectors/spotify/charts/fr/ts_history.json',
    dayUrl:  d  => { const [y,m]=d.split('-'); return `../collectors/spotify/charts/fr/data/${y}/${m}/${d}/ts_chart_${d}.json`; },
    title:      'France Spotify',
    coversUrl:  null,
  },
};

/* ════════════════════════════════════════
   STATE (per region)
════════════════════════════════════════ */
const S = {
  global: { hist:{}, avail:[], imgCache:{}, dayCache:{}, loaded:false },
  fr:     { hist:{}, avail:[], imgCache:{}, dayCache:{}, loaded:false },
};
let cjs = [];

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
const fmtN = n =>
  n == null ? '—' : Math.round(n).toLocaleString('en-US').replace(/,/g, '\u202f');

const fmtPct = p =>
  p == null ? '—' : `${p >= 0 ? '+' : ''}${p.toFixed(1)}%`;

const pCls = p => p == null ? '' : p >= 0 ? 'up' : 'dn';

function chgLabel(rank, prevRank, totalDays) {
  if (prevRank == null) {
    return (totalDays != null && totalDays > 0) ? ['RE', 'chg-re'] : ['NEW', 'chg-new'];
  }
  const d = Math.round(prevRank) - Math.round(rank);
  if (d > 0) return [`▲${d}`, 'chg-up'];
  if (d < 0) return [`▼${Math.abs(d)}`, 'chg-dn'];
  return ['=', 'chg-eq'];
}

function prevStream(rgn, name, date, days) {
  const d = new Date(date + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() - days);
  return S[rgn].hist[name]?.[d.toISOString().slice(0,10)]?.streams ?? null;
}

const fmtDate = s => new Date(s + 'T00:00:00').toLocaleDateString('en-US',
  { year: 'numeric', month: 'long', day: 'numeric' });

function killCharts() {
  cjs.forEach(c => { try { c.destroy(); } catch(e) {} });
  cjs = [];
}

function parseHash() {
  const raw = decodeURIComponent(location.hash.slice(1)) || 'global/chart';
  const parts = raw.split('/');
  let rgn = 'global', rest = raw;
  if (parts[0] === 'global' || parts[0] === 'fr') {
    rgn  = parts[0];
    rest = parts.slice(1).join('/') || 'chart';
  }
  return { rgn, rest };
}

function navActive(rgn, page) {
  document.getElementById('nl-global') ?.classList.toggle('active', rgn === 'global');
  document.getElementById('nl-fr')     ?.classList.toggle('active', rgn === 'fr');
  const nlChart   = document.getElementById('nl-chart');
  const nlHistory = document.getElementById('nl-history');
  if (nlChart)   { nlChart.href   = `#${rgn}/chart`;   nlChart.classList.toggle('active',   page === 'chart'); }
  if (nlHistory) { nlHistory.href = `#${rgn}/history`; nlHistory.classList.toggle('active', page === 'history'); }
}

/* ════════════════════════════════════════
   DATA LOADING
════════════════════════════════════════ */
async function loadHist(rgn) {
  if (S[rgn].loaded) return;
  const cfg = REGIONS[rgn];
  const proms = [fetch(cfg.histUrl())];
  if (cfg.coversUrl) proms.push(fetch(cfg.coversUrl).catch(() => null));
  else               proms.push(Promise.resolve(null));
  const [rh, rc] = await Promise.all(proms);
  if (!rh.ok) throw new Error(`Cannot load ts_history.json (${rgn})`);
  S[rgn].hist = await rh.json();
  if (rc?.ok) Object.assign(S[rgn].imgCache, await rc.json());
  const s = new Set();
  for (const dates of Object.values(S[rgn].hist))
    for (const d of Object.keys(dates)) s.add(d);
  S[rgn].avail  = [...s].sort();
  S[rgn].loaded = true;
}

async function loadDay(rgn, date) {
  if (S[rgn].dayCache[date]) return S[rgn].dayCache[date];
  try {
    const r = await fetch(REGIONS[rgn].dayUrl(date));
    if (!r.ok) return null;
    const data = await r.json();
    S[rgn].dayCache[date] = data;
    for (const row of data)
      if (row.image_url && row.track_name && !S[rgn].imgCache[row.track_name])
        S[rgn].imgCache[row.track_name] = row.image_url;
    return data;
  } catch { return null; }
}

/* ════════════════════════════════════════
   COMPUTATIONS
════════════════════════════════════════ */
function songsOn(rgn, date) {
  const out = [];
  for (const [name, dates] of Object.entries(S[rgn].hist)) {
    const e = dates[date];
    if (e) out.push({ name, ...e });
  }
  return out.sort((a, b) => a.rank - b.rank);
}

function outs(rgn, date) {
  const d = new Date(date + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  const yest = d.toISOString().slice(0, 10);
  const today = new Set(songsOn(rgn, date).map(s => s.name));
  return songsOn(rgn, yest).filter(s => !today.has(s.name));
}

function tierDays(rgn, name) {
  const vals = Object.values(S[rgn].hist[name] || {});
  return Object.fromEntries(
    [5,10,15,20,30,50,100,200].map(t => [t, vals.filter(v => v.rank <= t).length])
  );
}

function songStats(rgn, name) {
  const entries = Object.entries(S[rgn].hist[name] || {});
  if (!entries.length) return null;
  let peak = Infinity, best = 0;
  for (const [, v] of entries) {
    if (v.rank < peak) peak = v.rank;
    if ((v.streams || 0) > best) best = v.streams;
  }
  return { peak, best, total: entries.length };
}

function songHist(rgn, name) {
  return Object.entries(S[rgn].hist[name] || {})
    .map(([date, v]) => ({ date, ...v }))
    .sort((a, b) => a.date.localeCompare(b.date));
}

function isActive(rgn, name) {
  const h = songHist(rgn, name);
  if (!h.length) return false;
  return Date.now() - new Date(h[h.length-1].date).getTime() < 10 * 86400_000;
}

/* ════════════════════════════════════════
   BUILD CHART TABLE
════════════════════════════════════════ */
const SPOTIFY_SVG = `<svg width="46" height="46" viewBox="0 0 24 24" fill="white" style="flex-shrink:0;opacity:.95">
  <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
</svg>`;

function buildChart(rgn, date, songs, outSongs, extra) {
  const df = fmtDate(date);
  let body = '';

  songs.forEach((s, i) => {
    const ex = extra[s.name] || {};
    const prevRank = ex.previous_rank != null ? ex.previous_rank : s.previous_rank;
    // For old dates without per-day JSON, infer re-entry from ts_history.json
    const exTotalDays = ex.total_days != null ? ex.total_days
      : (Object.keys(S[rgn].hist[s.name] || {}).some(d => d < date) ? 2 : null);
    const [ct, cc] = chgLabel(s.rank, prevRank, exTotalDays);
    const ts = s.streams;
    const d1 = prevStream(rgn, s.name, date, 1);
    const d7 = prevStream(rgn, s.name, date, 7);
    const dp = (ts && d1) ? (ts - d1) / d1 * 100 : null;
    const wp = (ts && d7) ? (ts - d7) / d7 * 100 : null;
    const strk = ex.streak    ? `${Math.round(ex.streak)}d`     : '—';
    const tot  = ex.total_days ? `${Math.round(ex.total_days)}d` : '—';
    const pk   = s.peak_rank;
    const img  = S[rgn].imgCache[s.name] || ex.image_url;
    const art  = img
      ? `<img class="track-art" src="${img}" loading="lazy" alt="">`
      : `<div class="track-art-ph">♪</div>`;
    const pkH  = pk
      ? `<span class="peak-pill${pk === 1 ? ' p1' : ''}">#${pk}</span>` : '—';
    const cls  = s.rank === 1 ? 'gold' : (i % 2 !== 0 ? 'odd' : '');

    body += `<a class="song-row ${cls}" href="#${rgn}/song/${encodeURIComponent(s.name)}">
      <div class="col-pos">#${s.rank}</div>
      <div class="col-chg ${cc}">${ct}</div>
      <div class="col-track">${art}<div><div class="track-name">${s.name}</div><div class="track-artist">Taylor Swift</div></div></div>
      <div class="col-num">${fmtN(ts)}</div>
      <div class="col-num ${pCls(dp)}">${fmtPct(dp)}</div>
      <div class="col-num ${pCls(wp)}">${fmtPct(wp)}</div>
      <div class="col-num">${strk}</div>
      <div class="col-num">${tot}</div>
      <div class="col-num">${pkH}</div>
    </a>`;
  });

  if (outSongs.length) {
    body += `<div class="out-sep">↩ Left the chart</div>`;
    outSongs.forEach(s => {
      const img = S[rgn].imgCache[s.name];
      const art = img
        ? `<img class="track-art" src="${img}" loading="lazy" alt="">`
        : `<div class="track-art-ph">♪</div>`;
      body += `<div class="out-row">
        <div><span class="out-badge">OUT</span></div>
        <div class="col-chg" style="font-size:11px;font-weight:600;color:var(--muted)">#${s.rank}</div>
        <div class="col-track">${art}<div><div class="track-name">${s.name}</div><div class="track-artist">Taylor Swift</div></div></div>
      </div>`;
    });
  }

  return `<div class="chart-card">
    <div class="chart-hdr">
      ${SPOTIFY_SVG}
      <div>
        <div class="chart-hdr-title">Taylor Swift · ${REGIONS[rgn].title}</div>
        <div class="chart-hdr-sub">Daily Chart · ${df}</div>
      </div>
    </div>
    <div class="col-heads">
      <span>POS</span><span>CHG</span><span>TRACK</span>
      <span class="r">STREAMS</span><span class="r">D%</span><span class="r">W%</span>
      <span class="r">STREAK</span><span class="r">TOTAL</span><span class="r">PEAK</span>
    </div>
    ${body}
    <div class="chart-ftr">
      <span class="chart-ftr-handle">@swiftiescharts</span>
      <span class="chart-ftr-meta">${df} &middot; ${songs.length} track${songs.length !== 1 ? 's' : ''}</span>
    </div>
  </div>`;
}

/* ════════════════════════════════════════
   ROUTING
════════════════════════════════════════ */
function route() {
  killCharts();
  const { rgn, rest } = parseHash();
  if      (rest.startsWith('song/'))   renderSong(rgn, rest.slice(5));
  else if (rest.startsWith('history')) renderHistory(rgn, rest.split('/')[1] || S[rgn].avail[S[rgn].avail.length - 1]);
  else                                 renderToday(rgn);
}

/* ════════════════════════════════════════
   PAGE: TODAY
════════════════════════════════════════ */
async function renderToday(rgn) {
  navActive(rgn, 'chart');
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div> Loading…</div>`;

  await loadHist(rgn);
  const date    = S[rgn].avail[S[rgn].avail.length - 1];
  const dayData = await loadDay(rgn, date);
  const extra   = {};
  if (dayData) for (const r of dayData) extra[r.track_name] = r;

  app.innerHTML = buildChart(rgn, date, songsOn(rgn, date), outs(rgn, date), extra);
}

/* ════════════════════════════════════════
   PAGE: HISTORY
════════════════════════════════════════ */
async function renderHistory(rgn, date) {
  navActive(rgn, 'history');
  await loadHist(rgn);
  const avail = S[rgn].avail;
  if (!date || !avail.includes(date)) date = avail[avail.length - 1];
  const app = document.getElementById('app');

  const idx  = avail.indexOf(date);
  const prev = avail[idx - 1] || null;
  const next = avail[idx + 1] || null;

  app.innerHTML = `
  <div class="history-bar">
    <div>
      <div class="hbar-label">Browse by date</div>
      <div class="date-row">
        <button class="nav-btn" id="hprev" ${!prev ? 'disabled' : ''}>←</button>
        <input type="date" class="date-input" id="dpick"
          value="${date}" min="${avail[0]}" max="${avail[avail.length-1]}">
        <button class="nav-btn" id="hnext" ${!next ? 'disabled' : ''}>→</button>
      </div>
    </div>
    <div class="hbar-meta">
      <strong>${avail.length.toLocaleString()}</strong> dates available<br>
      <span style="font-size:11px">${avail[0]} → ${avail[avail.length-1]}</span>
    </div>
  </div>
  <div id="hchart"><div class="loading"><div class="spinner"></div></div></div>`;

  document.getElementById('dpick').addEventListener('change', e => {
    const v = e.target.value;
    const nearest = avail.includes(v) ? v
      : avail.reduce((a, b) =>
          Math.abs(new Date(b) - new Date(v)) < Math.abs(new Date(a) - new Date(v)) ? b : a);
    location.hash = `${rgn}/history/${nearest}`;
  });
  if (prev) document.getElementById('hprev').onclick = () => { location.hash = `${rgn}/history/${prev}`; };
  if (next) document.getElementById('hnext').onclick = () => { location.hash = `${rgn}/history/${next}`; };

  const dayData = await loadDay(rgn, date);
  const extra = {};
  if (dayData) for (const r of dayData) extra[r.track_name] = r;

  document.getElementById('hchart').innerHTML =
    buildChart(rgn, date, songsOn(rgn, date), outs(rgn, date), extra);
}

/* ════════════════════════════════════════
   PAGE: SONG
════════════════════════════════════════ */
async function renderSong(rgn, name) {
  navActive(rgn, '');
  await loadHist(rgn);
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div> Loading…</div>`;

  const h = songHist(rgn, name);
  if (!h.length) {
    app.innerHTML = `<div class="empty">Song not found: <em>${name}</em></div>`;
    return;
  }

  if (!S[rgn].imgCache[name]) await loadDay(rgn, h[h.length - 1].date);

  const st  = songStats(rgn, name);
  const tr  = tierDays(rgn, name);
  const act = isActive(rgn, name);
  const last = h[h.length - 1];
  const img  = S[rgn].imgCache[name];

  const art = img
    ? `<img class="song-art" src="${img}" alt="${name}">`
    : `<div class="song-art-ph">♪</div>`;

  const sub = [
    act && last.rank ? `Currently #${last.rank}` : null,
    `Peak #${st.peak}`,
    `${st.total} days on chart`,
  ].filter(Boolean).join(' · ');

  const tierHtml = [5,10,15,20,30,50,100,200].map(t => `
    <div class="tier-card">
      <div class="tier-lbl">Top ${t}</div>
      <div class="tier-val ${tr[t] > 0 ? 'has' : ''}">${tr[t]}</div>
    </div>`).join('');

  // History table — most recent first, max 150
  const rev = [...h].reverse().slice(0, 150);
  let histHtml = '';
  rev.forEach((entry, i) => {
    const prev   = h[h.length - 2 - i];
    const rd     = prev ? prev.rank - entry.rank : null;
    const rdH    = rd == null ? '—'
      : rd > 0 ? `<span style="color:var(--up)">▲${rd}</span>`
      : rd < 0 ? `<span style="color:var(--dn)">▼${Math.abs(rd)}</span>`
      : `<span style="color:var(--muted)">═</span>`;
    const sp   = prev?.streams;
    const dpct = (entry.streams != null && sp != null) ? entry.streams - sp : null;
    const pk   = entry.peak_rank ? `#${entry.peak_rank}` : '—';
    histHtml += `
    <div class="hist-row ${i === 0 && act ? 'hl' : ''}">
      <span>${entry.date}</span>
      <span style="text-align:center;display:block">#${entry.rank}</span>
      <span class="r">${fmtN(entry.streams)}</span>
      <span class="r ${pCls(dpct)}">${dpct == null ? '—' : (dpct >= 0 ? '+' : '') + fmtN(dpct)}</span>
      <span class="r">${rdH}</span>
      <span style="text-align:center;display:block">${pk}</span>
    </div>`;
  });

  app.innerHTML = `
  <div class="breadcrumb">
    <a href="#${rgn}/chart">Charts</a> <span>›</span> <span>${name}</span>
  </div>

  <div class="song-hdr">
    ${art}
    <div>
      <div class="song-name">${name}</div>
      <div class="song-artist">Taylor Swift</div>
      <div class="song-sub">${sub}</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val gold">#${st.peak}</div>
      <div class="stat-lbl">Peak Rank</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${st.total}</div>
      <div class="stat-lbl">Days on Chart</div>
    </div>
    <div class="stat-card">
      <div class="stat-val green">${fmtN(st.best)}</div>
      <div class="stat-lbl">Best Streams</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${act && last.rank ? '#' + last.rank : '—'}</div>
      <div class="stat-lbl">Current Rank</div>
    </div>
  </div>

  <div class="section-hdr">Days in chart by tier</div>
  <div class="tier-grid">${tierHtml}</div>

  <div class="chart-box">
    <div class="chart-box-title">📈 Rank over time <small>(lower = better)</small></div>
    <div class="chart-wrap"><canvas id="cRank"></canvas></div>
  </div>

  <div class="chart-box">
    <div class="chart-box-title">🎵 Daily streams over time</div>
    <div class="chart-wrap"><canvas id="cStr"></canvas></div>
  </div>

  <div class="section-hdr">Full history (${h.length} dates)</div>
  <div class="hist-table">
    <div class="hist-head">
      <span>Date</span>
      <span style="justify-content:center">Rank</span>
      <span class="r">Streams</span>
      <span class="r">Δ Streams</span>
      <span class="r">Δ Rank</span>
      <span style="justify-content:center">Peak</span>
    </div>
    ${histHtml}
    ${h.length > 150 ? `<div class="hist-more">Showing latest 150 of ${h.length} entries</div>` : ''}
  </div>`;

  /* Chart.js */
  const labels  = h.map(e => e.date);
  const ranks   = h.map(e => e.rank);
  const streams = h.map(e => e.streams);
  const sparse  = labels.length > 120;

  const base = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
  };

  const r = new Chart(document.getElementById('cRank').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: ranks,
      borderColor: '#1db954', backgroundColor: 'rgba(29,185,84,.1)',
      borderWidth: 2, tension: 0.3, fill: true,
      pointRadius: sparse ? 0 : 3, pointHoverRadius: 5,
    }]},
    options: { ...base,
      scales: {
        y: { reverse: true, grid: { color: 'rgba(0,0,0,.05)' },
          ticks: { font: { size: 11 }, callback: v => `#${v}` } },
        x: { grid: { display: false },
          ticks: { font: { size: 10 }, maxTicksLimit: 10, maxRotation: 0 } },
      },
      plugins: { ...base.plugins, tooltip: { callbacks: {
        title: c => c[0].label,
        label: c => `Rank #${c.parsed.y}`,
      }}},
    },
  });

  const s = new Chart(document.getElementById('cStr').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: streams,
      borderColor: '#7e57ff', backgroundColor: 'rgba(126,87,255,.1)',
      borderWidth: 2, tension: 0.3, fill: true,
      pointRadius: sparse ? 0 : 3, pointHoverRadius: 5,
    }]},
    options: { ...base,
      scales: {
        y: { grid: { color: 'rgba(0,0,0,.05)' },
          ticks: { font: { size: 11 },
            callback: v => v >= 1e6 ? `${(v/1e6).toFixed(1)}M`
              : v >= 1e3 ? `${(v/1e3).toFixed(0)}K` : v,
          }},
        x: { grid: { display: false },
          ticks: { font: { size: 10 }, maxTicksLimit: 10, maxRotation: 0 } },
      },
      plugins: { ...base.plugins, tooltip: { callbacks: {
        title: c => c[0].label,
        label: c => `${(c.parsed.y || 0).toLocaleString()} streams`,
      }}},
    },
  });

  cjs.push(r, s);
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
async function init() {
  try {
    const { rgn } = parseHash();
    await loadHist(rgn);
    window.addEventListener('hashchange', route);
    route();
  } catch(e) {
    document.getElementById('app').innerHTML = `
    <div class="empty">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      Failed to load chart data.<br>
      <span style="font-size:11px;color:var(--muted)">${e.message}</span>
    </div>`;
  }
}

init();
</script>
</body>
</html>
