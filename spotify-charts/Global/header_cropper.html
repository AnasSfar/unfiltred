<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Header Cropper — 828×80px</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 32px;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #fff; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }

  .drop-zone {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 28px;
    background: #1a1d27;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #1db954;
    background: #1a2a20;
  }
  .drop-zone input { display: none; }
  .drop-zone p { font-size: 14px; color: #aaa; }
  .drop-zone strong { color: #1db954; }

  #workspace { display: none; }

  .files-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }
  .file-thumb {
    width: 120px;
    height: 40px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s;
    position: relative;
  }
  .file-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .file-thumb.active { border-color: #1db954; }
  .file-thumb .fname {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-size: 8px;
    background: rgba(0,0,0,.6);
    color: #fff;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .canvas-wrap {
    position: relative;
    display: inline-block;
    cursor: crosshair;
    user-select: none;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    margin-bottom: 20px;
  }
  #main-img {
    display: block;
    max-width: 100%;
    max-height: 60vh;
  }
  /* Dark overlay everywhere */
  .overlay-top, .overlay-bottom, .overlay-left, .overlay-right {
    position: absolute;
    background: rgba(0,0,0,.55);
    pointer-events: none;
  }
  /* The crop window — no dark overlay here */
  .crop-window {
    position: absolute;
    border: 2px solid #1db954;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.55);
    cursor: grab;
    pointer-events: all;
  }
  .crop-window:active { cursor: grabbing; }
  /* Corner handles */
  .crop-window::before, .crop-window::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-color: #1db954;
    border-style: solid;
  }
  .crop-window::before {
    top: -2px; left: -2px;
    border-width: 3px 0 0 3px;
  }
  .crop-window::after {
    bottom: -2px; right: -2px;
    border-width: 0 3px 3px 0;
  }
  /* Ratio label inside */
  .crop-label {
    position: absolute;
    bottom: 4px; right: 6px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.7);
    pointer-events: none;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  .btn-save {
    background: #1db954;
    color: #fff;
  }
  .btn-save-all {
    background: #7c3aed;
    color: #fff;
  }
  .btn-reset {
    background: #2a2d3a;
    color: #aaa;
  }
  .info {
    font-size: 12px;
    color: #666;
  }
  #preview-wrap {
    margin-top: 20px;
    display: none;
  }
  #preview-wrap p { font-size: 12px; color: #888; margin-bottom: 8px; }
  #preview-canvas {
    border: 1px solid #333;
    border-radius: 4px;
    display: block;
  }
</style>
</head>
<body>

<h1>Header Cropper</h1>
<p class="sub">Découpe tes photos en 1656 × 160 px pour les headers du chart (2× pour rendu net). Glisse le cadre vert sur la zone voulue.</p>

<div class="drop-zone" id="drop-zone">
  <input type="file" id="file-input" accept="image/*" multiple>
  <p>📁 <strong>Clique ici</strong> ou glisse des images (JPG, PNG, WEBP)<br>
  <span style="font-size:12px;color:#666;margin-top:6px;display:block">Tu peux charger plusieurs photos à la fois</span></p>
</div>

<div id="workspace">
  <div class="files-grid" id="files-grid"></div>

  <div class="canvas-wrap" id="canvas-wrap">
    <img id="main-img" draggable="false">
    <div class="crop-window" id="crop-win">
      <span class="crop-label">1656×160</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-save" id="btn-save">⬇ Sauvegarder ce crop</button>
    <button class="btn-save-all" id="btn-save-all">⬇ Tout sauvegarder (position actuelle)</button>
    <button class="btn-reset" id="btn-reset">Recentrer le cadre</button>
    <span class="info" id="pos-info">y: 0 px</span>
  </div>

  <div id="preview-wrap">
    <p>Aperçu 828×80px :</p>
    <canvas id="preview-canvas" width="1656" height="160" style="max-width:100%;height:auto;"></canvas>
  </div>
</div>

<script>
const CROP_W = 1656, CROP_H = 160;

let files = [];       // {name, url, img} per loaded file
let activeIdx = 0;
let scale = 1;        // display scale (img display size / natural size)
let cropX = 0;        // crop left in natural pixels
let cropY = 0;        // crop top in natural pixels

const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const workspace  = document.getElementById('workspace');
const filesGrid  = document.getElementById('files-grid');
const mainImg    = document.getElementById('main-img');
const cropWin    = document.getElementById('crop-win');
const canvasWrap = document.getElementById('canvas-wrap');
const posInfo    = document.getElementById('pos-info');
const previewWrap = document.getElementById('preview-wrap');
const previewCanvas = document.getElementById('preview-canvas');

// --- Drop / file loading ---

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => loadFiles([...fileInput.files]));

function loadFiles(newFiles) {
  newFiles.forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      files.push({ name: f.name, url, img, file: f });
      rebuildThumbs();
      if (files.length === 1) selectFile(0);
    };
    img.src = url;
  });
}

function rebuildThumbs() {
  filesGrid.innerHTML = '';
  files.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-thumb' + (i === activeIdx ? ' active' : '');
    div.innerHTML = `<img src="${f.url}"><span class="fname">${f.name}</span>`;
    div.addEventListener('click', () => selectFile(i));
    filesGrid.appendChild(div);
  });
}

function selectFile(i) {
  activeIdx = i;
  rebuildThumbs();
  workspace.style.display = 'block';
  dropZone.style.display = 'none';

  const f = files[i];
  mainImg.src = f.url;
  mainImg.onload = () => {
    positionCropWindow();
    updatePreview();
  };
  if (mainImg.complete && mainImg.naturalWidth) {
    positionCropWindow();
    updatePreview();
  }
}

// --- Crop window positioning ---

function positionCropWindow() {
  const img = files[activeIdx].img;
  // Compute display dimensions
  const maxW = canvasWrap.parentElement.clientWidth - 2;
  const maxH = window.innerHeight * 0.6;
  scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);

  const dispW = img.naturalWidth  * scale;
  const dispH = img.naturalHeight * scale;
  mainImg.style.width  = dispW + 'px';
  mainImg.style.height = dispH + 'px';

  const cropDispW = CROP_W * scale;
  const cropDispH = CROP_H * scale;

  // Center
  cropX = Math.max(0, Math.floor((img.naturalWidth  - CROP_W) / 2));
  cropY = Math.max(0, Math.floor((img.naturalHeight - CROP_H) / 2));
  applyCrop();
}

function applyCrop() {
  const img = files[activeIdx].img;
  const cropDispW = CROP_W * scale;
  const cropDispH = CROP_H * scale;

  // Clamp
  cropX = Math.max(0, Math.min(cropX, img.naturalWidth  - CROP_W));
  cropY = Math.max(0, Math.min(cropY, img.naturalHeight - CROP_H));

  cropWin.style.left   = (cropX * scale) + 'px';
  cropWin.style.top    = (cropY * scale) + 'px';
  cropWin.style.width  = cropDispW + 'px';
  cropWin.style.height = cropDispH + 'px';

  posInfo.textContent = `x: ${cropX} px  y: ${cropY} px`;
  updatePreview();
}

// --- Drag crop window ---
let dragging = false, dragStartX = 0, dragStartY = 0, dragStartCropX = 0, dragStartCropY = 0;

cropWin.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartCropX = cropX;
  dragStartCropY = cropY;
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = (e.clientX - dragStartX) / scale;
  const dy = (e.clientY - dragStartY) / scale;
  cropX = Math.round(dragStartCropX + dx);
  cropY = Math.round(dragStartCropY + dy);
  applyCrop();
});

document.addEventListener('mouseup', () => { dragging = false; });

// Touch support
cropWin.addEventListener('touchstart', e => {
  dragging = true;
  dragStartX = e.touches[0].clientX;
  dragStartY = e.touches[0].clientY;
  dragStartCropX = cropX;
  dragStartCropY = cropY;
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = (e.touches[0].clientX - dragStartX) / scale;
  const dy = (e.touches[0].clientY - dragStartY) / scale;
  cropX = Math.round(dragStartCropX + dx);
  cropY = Math.round(dragStartCropY + dy);
  applyCrop();
}, { passive: false });
document.addEventListener('touchend', () => { dragging = false; });

// --- Preview ---
function updatePreview() {
  if (!files[activeIdx]) return;
  previewWrap.style.display = 'block';
  const ctx = previewCanvas.getContext('2d');
  const img = files[activeIdx].img;
  ctx.clearRect(0, 0, 1656, 160);
  ctx.drawImage(img, cropX, cropY, CROP_W, CROP_H, 0, 0, 1656, 160);
}

// --- Save ---
document.getElementById('btn-save').addEventListener('click', () => saveOne(activeIdx));

document.getElementById('btn-save-all').addEventListener('click', () => {
  files.forEach((_, i) => saveOne(i));
});

document.getElementById('btn-reset').addEventListener('click', () => {
  positionCropWindow();
});

function saveOne(i) {
  const f = files[i];
  const img = f.img;
  const canvas = document.createElement('canvas');
  canvas.width  = CROP_W;
  canvas.height = CROP_H;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, cropX, cropY, CROP_W, CROP_H, 0, 0, CROP_W, CROP_H);
  const a = document.createElement('a');
  const ext = f.name.match(/\.(png|webp)$/i) ? '$1' : 'jpg';
  const baseName = f.name.replace(/\.[^.]+$/, '');
  a.download = baseName + '_header.jpg';
  canvas.toBlob(blob => {
    a.href = URL.createObjectURL(blob);
    a.click();
  }, 'image/jpeg', 0.92);
}

// Keyboard nudge
document.addEventListener('keydown', e => {
  if (!files.length) return;
  if (e.key === 'ArrowUp')    { cropY -= 5; applyCrop(); e.preventDefault(); }
  if (e.key === 'ArrowDown')  { cropY += 5; applyCrop(); e.preventDefault(); }
  if (e.key === 'ArrowLeft')  { cropX -= 5; applyCrop(); e.preventDefault(); }
  if (e.key === 'ArrowRight') { cropX += 5; applyCrop(); e.preventDefault(); }
});
</script>
</body>
</html>
